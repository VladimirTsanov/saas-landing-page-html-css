<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="preload" href="./assets/fonts/Poppins-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./assets/fonts/Poppins-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./assets/fonts/Poppins-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./assets/fonts/Poppins-Bold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="icon" type="image/x-icon" href="./assets/images/web4every1_icon.png">
    <title>Web4Every1 - Hosting services and Domain Registration</title>
</head>

<body>
    <header>
        <a href="/">
            <img src="./assets/images/web4every1_logo-transparent.png" alt="Web4Every1 Logo" class="logo">
        </a>
        <div class="nav-wrapper">
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/">Features</a></li>
                    <li><a href="/">Pricing</a></li>
                    <li><a href="/">Contact</a></li>
                </ul>
            </nav>

            <a href="/" class="login-button">Sign In/Sign Up</a>
        </div>


        <div class="header-actions">
            <button class="theme-toggle" aria-label="Toggle theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sun-icon">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path
                        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41">
                    </path>
                </svg>

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>

            <button class="menu-toggle" aria-label="Toggle navigation menu">
                <span class="hamburger"></span>
            </button>
        </div>

    </header>



    <footer></footer>

    <script>
        // Theme toggle logic
        const themeToggle = document.querySelector('.theme-toggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Mobile menu toggle logic
        const menuToggle = document.querySelector('.menu-toggle');
        const header = document.querySelector('header');

        menuToggle.addEventListener('click', () => {
            header.classList.toggle('menu-open');
        });
    </script>
</body>

</html>
